<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#32CD32;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#leafGradient)" stroke-width="12" opacity="0.7"/>
  
  <!-- Main stem -->
  <path d="M 100 30 Q 95 70, 100 150" stroke="url(#leafGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Left side leaves -->
  <ellipse cx="70" cy="60" rx="18" ry="28" fill="url(#leafGradient)" opacity="0.85" transform="rotate(-35 70 60)" filter="url(#glow)"/>
  <ellipse cx="55" cy="85" rx="16" ry="26" fill="url(#leafGradient)" opacity="0.8" transform="rotate(-50 55 85)"/>
  <ellipse cx="50" cy="115" rx="17" ry="28" fill="url(#leafGradient)" opacity="0.85" transform="rotate(-55 50 115)"/>
  
  <!-- Right side leaves -->
  <ellipse cx="130" cy="60" rx="18" ry="28" fill="url(#leafGradient)" opacity="0.85" transform="rotate(35 130 60)" filter="url(#glow)"/>
  <ellipse cx="145" cy="85" rx="16" ry="26" fill="url(#leafGradient)" opacity="0.8" transform="rotate(50 145 85)"/>
  <ellipse cx="150" cy="115" rx="17" ry="28" fill="url(#leafGradient)" opacity="0.85" transform="rotate(55 150 115)"/>
  
  <!-- Center top leaf -->
  <ellipse cx="100" cy="45" rx="14" ry="20" fill="url(#leafGradient)" opacity="0.9" filter="url(#glow)"/>
</svg>